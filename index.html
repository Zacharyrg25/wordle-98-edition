<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="bar">
        <h1 id="title">Wordle 98</h1>
        <button id="tr1">?</button>
        <button id="tr2">X</button>
    </section>

    <section id="slots">
        <div class="row">
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
        </div>
        <div class="row">
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
        </div>
        <div class="row">
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
        </div>
        <div class="row">
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
        </div>
        <div class="row">
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
        </div>
        <div class="row">
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
        </div>
    </section>

    <p id="status"></p>

    <section id="keyboard">
        <div class="row">
            <button id="Q" class="key">Q</button>
            <button id="W" class="key">W</button>
            <button id="E" class="key">E</button>
            <button id="R" class="key">R</button>
            <button id="T" class="key">T</button>
            <button id="Y" class="key">Y</button>
            <button id="U" class="key">U</button>
            <button id="I" class="key">I</button>
            <button id="O" class="key">O</button>
            <button id="P" class="key">P</button>
        </div>
        <div class="row">
            <button id="A" class="key">A</button>
            <button id="S" class="key">S</button>
            <button id="D" class="key">D</button>
            <button id="F" class="key">F</button>
            <button id="G" class="key">G</button>
            <button id="H" class="key">H</button>
            <button id="J" class="key">J</button>
            <button id="K" class="key">K</button>
            <button id="L" class="key">L</button>
        </div>
        <div class="row">
            <button id="enter-key" class="key">Enter</button>
            <button id="Z" class="key">Z</button>
            <button id="X" class="key">X</button>
            <button id="C" class="key">C</button>
            <button id="V" class="key">V</button>
            <button id="B" class="key">B</button>
            <button id="N" class="key">N</button>
            <button id="M" class="key">M</button>
            <button id="delete-key" class="key">Delete</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
